# Deploy emd-ar-backoffice-fe → Azure CDN FrontDoor
# Trunk-based: solo main. Ambiente e versione selezionati manualmente al run.
#
# PARAMETRI:
#   ENV     → dev | uat | prod
#   VERSION → tag release-please (es. v1.2.0) oppure vuoto per ultimo commit su main

parameters:
  - name: ENV
    displayName: 'Target Environment'
    type: string
    default: dev
    values:
      - dev
      - uat
      - prod

  - name: VERSION
    displayName: 'Version tag (es. v1.2.0) — empty = latest commit on main'
    type: string
    default: ''

# NOTA: le variabili di root non possono usare ${{ parameters.* }} con if/elseif.
# Le variabili per ambiente vengono passate dalla pipeline AzDO (Terraform) e sono
# sempre tutte disponibili. La selezione avviene dentro gli stage con ${{ if }}.

variables:
  NODE_VERSION: '20.19.0'
  vmImageNameDefault: 'ubuntu-latest'
  BLOB_CONTAINER_NAME: '$web'

trigger: none
pr: none

pool:
  vmImage: $(vmImageNameDefault)

stages:
  - stage: Build
    displayName: 'Build [${{ parameters.ENV }}] ${{ coalesce(parameters.VERSION, ''latest'') }}'
    jobs:
      - job: make_build
        steps:
          - checkout: self
            fetchDepth: 0
            fetchTags: true

          - ${{ if ne(parameters.VERSION, '') }}:
            - bash: |
                git checkout tags/${{ parameters.VERSION }}
                echo "Checked out tag ${{ parameters.VERSION }}"
              displayName: 'Checkout tag ${{ parameters.VERSION }}'

          - task: NodeTool@0
            displayName: 'Setup Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - bash: npm ci
            displayName: 'Install dependencies'

          - ${{ if eq(parameters.ENV, 'prod') }}:
            - bash: npm run build
              displayName: 'Build (PROD)'
              env:
                VITE_ENV: PROD
                VITE_API_BASE_URL: https://api-emd.cstar.pagopa.it
                VITE_AR_BASE_URL: https://selfcare.pagopa.it
                VITE_APPINSIGHTS_CONNECTION_STRING: $(PROD_APPINSIGHTS_CONNECTION_STRING)

          - ${{ elseif eq(parameters.ENV, 'uat') }}:
            - bash: npm run build
              displayName: 'Build (UAT)'
              env:
                VITE_ENV: UAT
                VITE_API_BASE_URL: https://api-emd.uat.cstar.pagopa.it
                VITE_AR_BASE_URL: https://uat.selfcare.pagopa.it
                VITE_APPINSIGHTS_CONNECTION_STRING: $(UAT_APPINSIGHTS_CONNECTION_STRING)

          - ${{ else }}:
            - bash: npm run build
              displayName: 'Build (DEV)'
              env:
                VITE_ENV: DEV
                VITE_API_BASE_URL: https://api-emd.dev.cstar.pagopa.it
                VITE_AR_BASE_URL: https://dev.selfcare.pagopa.it
                VITE_APPINSIGHTS_CONNECTION_STRING: $(DEV_APPINSIGHTS_CONNECTION_STRING)

          # Scrive build.info nel dist — visibile su CDN per tracciare la versione deployata
          - bash: |
              cat > $(System.DefaultWorkingDirectory)/dist/build.info <<EOF
              version=${{ coalesce(parameters.VERSION, 'latest') }}
              commit=$(git rev-parse HEAD)
              build=$(Build.BuildNumber)
              environment=${{ parameters.ENV }}
              date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              EOF
            displayName: 'Write build.info'

          - publish: $(System.DefaultWorkingDirectory)/dist
            artifact: Bundle

  - stage: Deploy
    displayName: 'Deploy to ${{ upper(parameters.ENV) }}'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: Deploy
        environment: '${{ upper(parameters.ENV) }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: Bundle

                - ${{ if eq(parameters.ENV, 'prod') }}:
                  - task: AzureCLI@2
                    displayName: 'Sync Blob Storage (PROD)'
                    inputs:
                      azureSubscription: $(PROD_AZURE_SUBSCRIPTION)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        az storage blob sync \
                          --container '$(BLOB_CONTAINER_NAME)' \
                          --account-name $(PROD_STORAGE_ACCOUNT) \
                          -s "$(Pipeline.Workspace)/Bundle"
                  - task: AzureCLI@2
                    displayName: 'Purge CDN (PROD)'
                    inputs:
                      azureSubscription: $(PROD_AZURE_SUBSCRIPTION)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        az afd endpoint purge \
                          -g $(PROD_RESOURCE_GROUP) \
                          --profile-name $(PROD_CDN_PROFILE) \
                          --endpoint-name $(PROD_CDN_ENDPOINT) \
                          --domains $(PROD_CDN_DOMAINS) \
                          --content-paths '/*' '/'

                - ${{ elseif eq(parameters.ENV, 'uat') }}:
                  - task: AzureCLI@2
                    displayName: 'Sync Blob Storage (UAT)'
                    inputs:
                      azureSubscription: $(UAT_AZURE_SUBSCRIPTION)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        az storage blob sync \
                          --container '$(BLOB_CONTAINER_NAME)' \
                          --account-name $(UAT_STORAGE_ACCOUNT) \
                          -s "$(Pipeline.Workspace)/Bundle"
                  - task: AzureCLI@2
                    displayName: 'Purge CDN (UAT)'
                    inputs:
                      azureSubscription: $(UAT_AZURE_SUBSCRIPTION)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        az afd endpoint purge \
                          -g $(UAT_RESOURCE_GROUP) \
                          --profile-name $(UAT_CDN_PROFILE) \
                          --endpoint-name $(UAT_CDN_ENDPOINT) \
                          --domains $(UAT_CDN_DOMAINS) \
                          --content-paths '/*' '/'

                - ${{ else }}:
                  - task: AzureCLI@2
                    displayName: 'Sync Blob Storage (DEV)'
                    inputs:
                      azureSubscription: $(DEV_AZURE_SUBSCRIPTION)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        az storage blob sync \
                          --container '$(BLOB_CONTAINER_NAME)' \
                          --account-name $(DEV_STORAGE_ACCOUNT) \
                          -s "$(Pipeline.Workspace)/Bundle"

                        az storage blob update \
                          --container '$(BLOB_CONTAINER_NAME)' \
                          --account-name $(DEV_STORAGE_ACCOUNT) \
                          --name 'index.html' \
                          --content-cache-control 'no-store, no-cache, must-revalidate' \
                          --content-type 'text/html'
                  - task: AzureCLI@2
                    displayName: 'Purge CDN (DEV)'
                    inputs:
                      azureSubscription: $(DEV_AZURE_SUBSCRIPTION)
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        az afd endpoint purge \
                          -g $(DEV_RESOURCE_GROUP) \
                          --profile-name $(DEV_CDN_PROFILE) \
                          --endpoint-name $(DEV_CDN_ENDPOINT) \
                          --domains $(DEV_CDN_DOMAINS) \
                          --content-paths '/*' '/'