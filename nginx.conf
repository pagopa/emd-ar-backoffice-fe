server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint per AKS liveness/readiness probe
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html e env-config.js non devono mai essere cachati dal browser:
    # - index.html non ha hash nel nome
    # - env-config.js non è nella build, viene generato a runtime da entrypoint.sh
    #   ad ogni avvio del container con le variabili d'ambiente aggiornate
    location ~* ^/(index\.html|env-config\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gli asset generati da Vite hanno l'hash nel nome (es. main.abc123.js),
    # quindi possono essere cachati aggressivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

